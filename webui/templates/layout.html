{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pcloudcc — {{block "title" .}}Dashboard{{end}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <div class="nav-brand">pcloudcc</div>
    <div class="nav-links">
      <a href="/" {{if eq .Active "status"}}class="active"{{end}}>Status</a>
      <a href="/logs" {{if eq .Active "logs"}}class="active"{{end}}>Logs</a>
      <a href="/setup" {{if eq .Active "setup"}}class="active"{{end}}>Setup</a>
    </div>
  </nav>
  <main>
    {{block "content" .}}{{end}}
  </main>
  <footer>
    <span>pcloudcc-webui</span>
  </footer>
</body>
</html>
{{end}}
