volumes:
  pconfig: {}

services:
  pcloud:
    build:
      context: .
      args:
        PCLOUDCC_REF: main
    restart: unless-stopped
    volumes:
      - pconfig:/root/.pcloud:rw
      - /path/to/your/pcloud:/pcloud:rshared
    env_file:
      - .env
    environment:
      - ENABLE_BINDFS=1
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /pcloud_internal
    security_opt:
      - apparmor:unconfined
      - no-new-privileges:true
    devices:
      - /dev/fuse
    # Drop all default capabilities and add back only what is actually needed.
    # SYS_ADMIN: required for FUSE mount/umount by pcloudcc and bindfs.
    # CHOWN:     required by entrypoint.sh to chown the mount point to USER:GROUP.
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
      - CHOWN
    # Required for first-time interactive login; can be removed after initial credential setup.
    stdin_open: true
    tty: true
