volumes:
  pconfig: {}
  pcloud-shared: {}

services:
  pcloud:
    build:
      context: .
      args:
        PCLOUDCC_REF: main
    restart: unless-stopped
    volumes:
      - pconfig:/root/.pcloud:rw
      - pcloud-shared:/pcloud-shared:rw
      - /path/to/your/pcloud:/pcloud:rshared
    env_file:
      - .env
    environment:
      - ENABLE_BINDFS=1
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - apparmor:unconfined
      - no-new-privileges:true
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    stdin_open: true
    tty: true

  webui:
    build:
      context: ./webui
    restart: unless-stopped
    volumes:
      - pconfig:/pcloud-config:ro
      - pcloud-shared:/pcloud-shared:rw
    ports:
      - "${WEBUI_PORT:-8080}:8080"
    environment:
      - WEBUI_USER=${WEBUI_USER:-admin}
      - WEBUI_PASS=${WEBUI_PASS:?WEBUI_PASS is required — set it in .env}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    depends_on:
      - pcloud
