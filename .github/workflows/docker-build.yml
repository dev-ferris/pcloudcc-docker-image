name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  schedule:
    # Weekly rebuild for Debian security updates (upstream changes detected by check-upstream.yml)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      pcloudcc_ref:
        description: 'lneely/pcloudcc-lneely ref to build (branch, tag, or commit SHA)'
        required: false
        default: 'main'
        type: string

concurrency:
  # Serialize builds per ref so scheduled/upstream-triggered runs don't race with
  # push-triggered ones. We don't cancel in-progress builds: multi-arch builds are
  # expensive and we'd rather wait than throw work away.
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # cosign keyless signing via GitHub OIDC
      security-events: write   # upload Trivy SARIF results to the Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker Hub configuration
        id: dockerhub_check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE_NAME_OVERRIDE: ${{ vars.DOCKERHUB_IMAGE_NAME }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "image=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$DOCKERHUB_IMAGE_NAME_OVERRIDE" ]; then
            image="$DOCKERHUB_IMAGE_NAME_OVERRIDE"
          else
            image="${DOCKERHUB_USERNAME}/${GITHUB_REPO_NAME}"
          fi

          # Docker Hub repository names must be lowercase.
          image="$(printf '%s' "$image" | tr '[:upper:]' '[:lower:]')"

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && steps.dockerhub_check.outputs.enabled == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          # metadata-action automatically emits OCI labels, including
          # org.opencontainers.image.revision = ${{ github.sha }}, so the git SHA
          # is baked into every published image via the labels: input below.
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ steps.dockerhub_check.outputs.enabled == 'true' && format('docker.io/{0}', steps.dockerhub_check.outputs.image) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern=nightly
            type=raw,value={{date 'YYYY-MM-DD'}},enable=${{ github.event_name != 'pull_request' }}

      # Build linux/amd64 locally so Trivy can gate on it before anything is
      # published. Multi-platform builds can't be loaded into the local daemon,
      # so we build amd64-only here and export to a tar archive.
      - name: Build linux/amd64 for vulnerability scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          outputs: type=docker,dest=/tmp/scan-image.tar
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PCLOUDCC_REF=${{ inputs.pcloudcc_ref || 'main' }}
          # Read from the shared cache; don't write — the full multi-platform
          # build below will update it.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache

      # Gate: fail the build before any push if CRITICAL or HIGH unfixed CVEs
      # are found. Runs on every event including pull_requests so PRs are also
      # blocked. The SARIF file is written regardless of exit code so the
      # upload step below can always pick it up.
      - name: Run Trivy vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: /tmp/scan-image.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # Full multi-platform build and push. Runs only after the Trivy gate
      # passes and only on non-PR events.
      - name: Build and push (all platforms)
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # PCLOUDCC_REF defaults to 'main' for push/schedule/PR triggers and can be
          # overridden on manual runs via the workflow_dispatch input (or by
          # check-upstream.yml when a new upstream tag is detected).
          build-args: |
            PCLOUDCC_REF=${{ inputs.pcloudcc_ref || 'main' }}
          provenance: mode=max
          sbom: true
          # BuildKit reuses layers from the scan build above (same daemon),
          # so this is effectively just the push, not a full rebuild.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign published images
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Keyless sign every tag reference against the pushed manifest digest.
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Smoke test image (linux/amd64)
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          docker pull --platform linux/amd64 "$IMAGE"
          docker run --rm --platform linux/amd64 --entrypoint /bin/sh "$IMAGE" -c '
            set -e
            test -x /usr/local/bin/pcloudcc
            test -x /entrypoint.sh
            test -x /usr/bin/bindfs
            echo "--- ldd /usr/local/bin/pcloudcc ---"
            ldd /usr/local/bin/pcloudcc
            if ldd /usr/local/bin/pcloudcc 2>&1 | grep -q "not found"; then
              echo "ERROR: pcloudcc has unresolved shared libraries"
              exit 1
            fi
            echo "Smoke test OK"
          '

      - name: Update Docker Hub description
        # The description sync hits Docker Hub's /v2/repositories/<ns>/<repo>/
        # PATCH endpoint, which requires a higher token scope than plain image
        # pushes. A PAT with "Read & Write" is enough to push layers but will
        # return 403 Forbidden here. To actually update the description you
        # need either:
        #   - a Docker Hub PAT with the "Read, Write & Delete" scope, OR
        #   - an Organization Access Token with repo-admin rights, OR
        #   - the account password (not recommended).
        # Either way we don't want a cosmetic sync to fail the entire build,
        # so this step is best-effort.
        if: >-
          github.event_name == 'push'
          && github.ref == 'refs/heads/main'
          && steps.dockerhub_check.outputs.enabled == 'true'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ steps.dockerhub_check.outputs.image }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
