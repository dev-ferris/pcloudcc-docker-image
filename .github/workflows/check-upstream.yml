name: Check upstream for new commits

on:
  schedule:
    # Check every 6 hours for new commits/tags in lneely/pcloudcc-lneely
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-upstream-main:
    name: Check upstream main branch
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Get upstream latest commit SHA
        id: upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(curl -sf -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/lneely/pcloudcc-lneely/commits/main" \
            | jq -r '.sha')
          if [ -z "${SHA}" ] || [ "${SHA}" = "null" ]; then
            echo "ERROR: Failed to fetch upstream commit SHA" >&2
            exit 1
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Upstream main SHA: ${SHA}"

      - name: Check against cached SHA
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: upstream-sha.txt
          key: upstream-sha-${{ steps.upstream.outputs.sha }}

      - name: Trigger build on new upstream commit
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          echo "${UPSTREAM_SHA}" > upstream-sha.txt
          echo "New upstream commit detected: ${UPSTREAM_SHA}"
          gh workflow run docker-build.yml \
            --repo "${GITHUB_REPOSITORY}" \
            -f pcloudcc_ref=main
          echo "Build workflow triggered for ref=main."

  check-upstream-tag:
    name: Check upstream tags
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Get upstream latest tag
        id: upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # /tags returns the most recently created tag first.
          TAG=$(curl -sf -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/lneely/pcloudcc-lneely/tags?per_page=1" \
            | jq -r '.[0].name // empty')
          if [ -z "${TAG}" ]; then
            echo "No tags found upstream — nothing to do."
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Upstream latest tag: ${TAG}"

      - name: Check against cached tag
        if: steps.upstream.outputs.tag != ''
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: upstream-tag.txt
          key: upstream-tag-${{ steps.upstream.outputs.tag }}

      - name: Trigger build on new upstream tag
        if: steps.upstream.outputs.tag != '' && steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          echo "${UPSTREAM_TAG}" > upstream-tag.txt
          echo "New upstream tag detected: ${UPSTREAM_TAG}"
          gh workflow run docker-build.yml \
            --repo "${GITHUB_REPOSITORY}" \
            -f pcloudcc_ref="${UPSTREAM_TAG}"
          echo "Build workflow triggered for ref=${UPSTREAM_TAG}."
